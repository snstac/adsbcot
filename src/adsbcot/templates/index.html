<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADSBCOT Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .container { max-width: 800px; }
        .form-group { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">ADSBCOT Configuration</h1>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Geofence Settings</h5>
                <form id="settingsForm">
                    <div class="form-group">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="geofenceEnabled">
                            <label class="form-check-label" for="geofenceEnabled">Enable Geofencing</label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="geofenceLat">Center Latitude</label>
                        <input type="number" class="form-control" id="geofenceLat" step="0.000001">
                    </div>
                    
                    <div class="form-group">
                        <label for="geofenceLon">Center Longitude</label>
                        <input type="number" class="form-control" id="geofenceLon" step="0.000001">
                    </div>
                    
                    <div class="form-group">
                        <label for="geofenceRadius">Radius (nautical miles)</label>
                        <input type="number" class="form-control" id="geofenceRadius" step="0.1">
                    </div>
                    
                    <div class="form-group">
                        <label for="minAltitude">Minimum Altitude (feet)</label>
                        <input type="number" class="form-control" id="minAltitude" step="100">
                    </div>
                    
                    <div class="form-group">
                        <label for="maxAltitude">Maximum Altitude (feet)</label>
                        <input type="number" class="form-control" id="maxAltitude" step="100">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </form>
            </div>
        </div>
        
        <div id="statusMessage" class="mt-3"></div>
    </div>

    <script>
        // Load current settings
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                
                document.getElementById('geofenceEnabled').checked = settings.geofence_enabled;
                document.getElementById('geofenceLat').value = settings.geofence_lat;
                document.getElementById('geofenceLon').value = settings.geofence_lon;
                document.getElementById('geofenceRadius').value = settings.geofence_radius_nm;
                document.getElementById('minAltitude').value = settings.min_altitude;
                document.getElementById('maxAltitude').value = settings.max_altitude;
            } catch (error) {
                showStatus('Error loading settings: ' + error.message, 'danger');
            }
        }

        // Save settings
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const settings = {
                geofence_enabled: document.getElementById('geofenceEnabled').checked,
                geofence_lat: parseFloat(document.getElementById('geofenceLat').value),
                geofence_lon: parseFloat(document.getElementById('geofenceLon').value),
                geofence_radius_nm: parseFloat(document.getElementById('geofenceRadius').value),
                min_altitude: parseFloat(document.getElementById('minAltitude').value),
                max_altitude: parseFloat(document.getElementById('maxAltitude').value)
            };
            
            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(settings)
                });
                
                const result = await response.json();
                if (result.status === 'success') {
                    showStatus('Settings saved successfully!', 'success');
                } else {
                    showStatus('Error saving settings: ' + result.message, 'danger');
                }
            } catch (error) {
                showStatus('Error saving settings: ' + error.message, 'danger');
            }
        });

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `alert alert-${type} mt-3`;
            statusDiv.textContent = message;
            
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = '';
            }, 5000);
        }

        // Load settings when page loads
        loadSettings();
    </script>
</body>
</html>
